---
name: Bug Report
description: Report a broken or incorrect test, selector issue, or framework bug
title: "[Bug]: "
labels: [bug, needs-triage]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. Please be as detailed as possible.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and this has not been reported before
          required: true
        - label: I have run `npm install` to ensure dependencies are up to date
          required: true

  - type: dropdown
    id: bug-area
    attributes:
      label: Area
      description: Which part of the framework is affected?
      options:
        - Test Spec (cypress/e2e/)
        - Page Object (src/pages/)
        - Cypress Config (cypress.config.ts)
        - CI Pipeline (.github/workflows/)
        - Allure Report
        - Other
    validations:
      required: true

  - type: input
    id: affected-test
    attributes:
      label: Affected test file(s)
      description: Which test file(s) exhibit the bug?
      placeholder: "e.g. cypress/e2e/login.cy.ts"

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Run `npm test`
        2. See failure in ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behaviour
      description: What actually happened? Include error messages or logs.
    validations:
      required: true

  - type: input
    id: cypress-version
    attributes:
      label: Cypress version
      placeholder: "e.g. 15.12.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 14, Windows 11, Ubuntu 22.04"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, logs, or any other relevant information.
